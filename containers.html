<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контейнеры — Симулятор Игр</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .containers-section-title {
            font-size: 24px;
            font-weight: 700;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }
        .vip-title { color: #ffca28; border-bottom-color: #ffca28; }
        .special-title { color: #ff4757; border-bottom-color: #ff4757; }
        .tax-title { color: #2ed573; border-bottom-color: #2ed573; }
        .containers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            margin-top: 10px;
        }
        .container-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .container-card.vip-card { border: 1px solid #ffca28; box-shadow: 0 0 10px rgba(255, 202, 40, 0.1); }
        .container-card.special-card { border: 1px solid #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.1); }
        .container-card.tax-card { border: 1px solid #2ed573; box-shadow: 0 0 10px rgba(46, 213, 115, 0.1); }
        .container-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .container-card.vip-card:hover { box-shadow: 0 8px 25px rgba(255, 202, 40, 0.25); }
        .container-card.special-card:hover { box-shadow: 0 8px 25px rgba(255, 71, 87, 0.25); }
        .container-card.tax-card:hover { box-shadow: 0 8px 25px rgba(46, 213, 115, 0.25); }
        .container-img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background-color: rgba(0,0,0,0.1); }
        .container-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .container-price { font-size: 18px; color: var(--success); font-weight: 600; margin-bottom: 15px; }
        .vip-price { color: #ffca28; }
        .special-price { color: #ff4757; }
        .tax-price { color: #2ed573; }
                
        .btn-vip { background: #ffca28; color: #000 !important; font-weight: bold; border: none; }
        .btn-vip:hover { background: #ffe082; }
        .btn-special { background: #ff4757; color: #fff !important; font-weight: bold; border: none; }
        .btn-special:hover { background: #ff6b81; }
        .btn-tax { background: #2ed573; color: #fff !important; font-weight: bold; border: none; }
        .btn-tax:hover { background: #5edb93; }
                
        .drop-zone {
            width: 100%;
            background-color: var(--card-bg);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .win-card { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .win-car-img { max-width: 320px; width: 100%; height: 180px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .win-title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .win-cost { font-size: 20px; font-weight: 600; }
        .text-success { color: #2ecc71; }
        .text-danger { color: #e74c3c; }
        .text-info { color: #3498db; }
        .text-jackpot { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        .category-navigation { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .category-tab-btn { padding: 12px 24px; background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; transition: all 0.2s; }
        .category-tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        #tab-diplomatic.active { background: #ffca28; color: #000; border-color: #ffca28; }
        #tab-special.active { background: #ff4757; color: #fff; border-color: #ff4757; }
        #tab-tax.active { background: #2ed573; color: #fff; border-color: #2ed573; }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="dark-theme" id="app-body">

    <header class="app-header">
        <div class="header-logo">
            <span style="font-size: 24px;">📦</span> 
            <h1>Порт Контейнеров</h1>
        </div>
        <div class="header-controls">
            <a href="index.html" class="btn btn-secondary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 5px;">
                🏠 На главную
            </a>
            <button onclick="toggleTheme()" class="btn btn-secondary" id="theme-btn">🌙 Тема</button>
            <div class="balance-display">Баланс: <span id="user-balance">200.00</span> ₽</div>
        </div>
    </header>

    <main class="game-area" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        
        <div class="drop-zone" id="drop-container">
            <div id="container-drop-result" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div style="font-size: 50px; opacity: 0.3;">⚓</div>
                <p style="opacity: 0.6; margin-top: 10px; font-size: 16px;" id="drop-status">Купите контейнер, чтобы разгрузить его и узнать содержимое</p>
            </div>
        </div>

        <div class="category-navigation">
            <button onclick="switchCategory('regular')" class="category-tab-btn active" id="tab-regular">📦 Обычные</button>
            <button onclick="switchCategory('vip')" class="category-tab-btn" id="tab-diplomatic">👑 Дипломатические</button>
            <button onclick="switchCategory('special')" class="category-tab-btn" id="tab-special">🔥 Особые</button>
            <button onclick="switchCategory('tax')" class="category-tab-btn" id="tab-tax">📈 Налоговый</button>
        </div>

        <div id="section-regular" class="container-section">
            <div class="containers-section-title">📦 Обычные контейнеры</div>
            <div class="containers-grid" id="grid-regular"></div>
        </div>

        <div id="section-vip" class="container-section" style="display: none;">
            <div class="containers-section-title vip-title">👑 Дипломатические контейнеры</div>
            <div class="containers-grid" id="grid-vip"></div>
        </div>

        <div id="section-special" class="container-section" style="display: none;">
            <div class="containers-section-title special-title">🔥 Особые контейнеры</div>
            <div class="containers-grid" id="grid-special"></div>
        </div>

        <div id="section-tax" class="container-section" style="display: none;">
            <div class="containers-section-title tax-title">📈 Налоговый контейнер</div>
            <div class="containers-grid" id="grid-tax"></div>
        </div>

    </main>

    <div id="content-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); padding:20px; border-radius:12px; max-width:440px; width:90%; max-height:80vh; overflow-y:auto; position:relative;">
            <h3 style="margin-top:0; color:#fff;">Состав контейнера</h3>
            <div id="container-preview-list"></div>
            <button onclick="closeContainerModal()" class="btn btn-secondary" style="width:100%; margin-top:15px;">Закрыть</button>
        </div>
    </div>

    <script src="containers.js"></script>
    
    <script>
        // Рендерим контейнеры динамически из базы данных
        for (const key in containersData) {
            const data = containersData[key];
            let targetGridId = 'grid-regular';
            let cardClass = 'container-card';
            let priceClass = 'container-price';
            let btnClass = 'btn-primary';

            // Проверяем категорию контейнера
            if (data.isVip) {
                targetGridId = 'grid-vip';
                cardClass += ' vip-card';
                priceClass += ' vip-price';
                btnClass = 'btn-vip';
            } else if (key.startsWith('special_')) {
                targetGridId = 'grid-special';
                cardClass += ' special-card';
                priceClass += ' special-price';
                btnClass = 'btn-special';
            } else if (key === 'tax_container') {
                targetGridId = 'grid-tax';
                cardClass += ' tax-card';
                priceClass += ' tax-price';
                btnClass = 'btn-tax';
            }

            const gridEl = document.getElementById(targetGridId);
            if (gridEl) {
                // Пути к картинкам кейсов
                let imgPath = `images/${key}.png`; 
                if (key === 'tax_container') {
                    imgPath = `images/tax.png`;
                }

                const cardHtml = `
                    <div class="${cardClass}">
                        <div>
                            <img src="${imgPath}" alt="${data.title}" class="container-img" onerror="this.src='https://placehold.co/400x250/2a2a35/ffffff?text=${encodeURIComponent(data.title)}'">
                            <div class="container-title">${data.title}</div>
                            <div class="${priceClass}">${data.cost.toLocaleString('ru-RU')} ₽</div>
                        </div>
                        <div style="margin-top: 15px;">
                            <button onclick="openContainer('${key}')" class="btn ${btnClass}" style="width: 100%;">Открыть</button>
                            <button onclick="previewContainer('${key}')" class="btn btn-secondary" style="width: 100%; margin-top: 5px;">Состав</button>
                        </div>
                    </div>
                `;
                gridEl.innerHTML += cardHtml;
            }
        }

        // Правильная инициализация после загрузки окна
        window.addEventListener('load', function() {
            switchCategory('regular');
        });
    </script>
</body>
</html>
